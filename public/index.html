<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸦木布拉夫小镇 - 玩家终端</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #bb86fc;
            --secondary: #03dac6;
            --bg: #121212;
            --surface: rgba(255, 255, 255, 0.05);
            --error: #cf6679;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans SC', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px 30px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--primary); letter-spacing: 2px; }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 侧边栏：玩家列表 */
        .sidebar {
            width: 260px;
            background: rgba(255,255,255,0.02);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--surface);
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .player-item.dead { opacity: 0.5; text-decoration: line-through; border-left: 3px solid var(--error); }
        .player-item.alive { border-left: 3px solid var(--secondary); }

        /* 主体：聊天日志 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: radial-gradient(circle at center, #1e1e1e 0%, #121212 100%);
        }

        #logBox {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 10px;
        }

        .msg-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .system-msg { background: rgba(187, 134, 252, 0.1); border: 1px solid var(--primary); align-self: center; font-size: 0.9rem; color: var(--primary); }
        .player-msg { background: var(--surface); align-self: flex-start; }
        .self-msg { background: rgba(3, 218, 198, 0.1); border: 1px solid var(--secondary); align-self: flex-end; }

        /* 操作区域 */
        .action-area {
            height: 180px;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px 40px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .input-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        
        select, input, button {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--primary);
            color: #000;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            min-width: 120px;
        }

        button:hover { background: #d7b7fd; transform: scale(1.02); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        .phase-indicator {
            padding: 5px 12px;
            background: var(--primary);
            color: black;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>RAVENSWOOD BLUFF</h1>
            <small id="status-text" style="color: grey;">Waiting for connection...</small>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span id="current-phase-display" class="phase-indicator">SETUP</span>
            <input type="text" id="playerId" value="h1" style="width: 60px; padding: 5px;">
            <button id="connectBtn" onclick="connect()" style="min-width: 80px; padding: 5px;">Join</button>
        </div>
    </header>

    <main class="main-layout">
        <div class="sidebar">
            <h3 style="margin-top: 0; color: var(--secondary);">Players</h3>
            <div id="playerList">
                <!-- Players will be injected here -->
            </div>
        </div>

        <div class="chat-container">
            <div id="logBox">
                <div class="msg-bubble system-msg">Please connect to the server to start.</div>
            </div>
        </div>
    </main>

    <div class="action-area">
        <div class="input-group">
            <label id="action-prompt" style="font-weight: 600; color: var(--secondary);">Panel</label>
            <div id="controls-container" style="display: flex; gap: 10px;">
                <input type="text" id="actionInput" placeholder="Content..." style="flex: 1;">
                
                <select id="targetSelect" style="display: none;">
                    <option value="">Select Target...</option>
                </select>

                <select id="voteSelect" style="display: none;">
                    <option value="false">Against / Abstain</option>
                    <option value="true">For / Execute</option>
                </select>

                <select id="toneSelect">
                    <option value="calm">Calm</option>
                    <option value="passionate">Passionate</option>
                    <option value="accusatory">Accusatory</option>
                </select>
            </div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button id="skipBtn" onclick="skipDiscussion()" style="background: var(--surface); color: white; display: none;">End Discussion</button>
            <button id="submitBtn" onclick="sendAction()" disabled>Submit Action</button>
        </div>
    </div>

    <script>
        let ws = null;
        let pendingActionType = null;
        let players = [];

        function logMessage(text, type = 'system', senderName = '') {
            const box = document.getElementById('logBox');
            const div = document.createElement('div');
            div.className = `msg-bubble ${type}-msg`;
            
            if (senderName) {
                div.innerHTML = `<strong style="color: var(--primary)">${senderName}:</strong> ${text}`;
            } else {
                div.textContent = text;
            }
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function updatePlayerList(playerData) {
            players = playerData;
            const container = document.getElementById('playerList');
            container.innerHTML = '';
            
            const targetSelect = document.getElementById('targetSelect');
            targetSelect.innerHTML = '<option value="">Select Target...</option>';

            playerData.forEach(p => {
                const div = document.createElement('div');
                div.className = `player-item ${p.is_alive ? 'alive' : 'dead'}`;
                div.innerHTML = `<span>${p.name}</span> <small>${p.is_alive ? 'ALIVE' : 'DEAD'}</small>`;
                container.appendChild(div);

                if (p.is_alive && p.player_id !== document.getElementById('playerId').value) {
                    const opt = document.createElement('option');
                    opt.value = p.player_id;
                    opt.textContent = p.name;
                    targetSelect.appendChild(opt);
                }
            });
        }

        async function fetchGameState() {
            try {
                const res = await fetch('http://localhost:8000/api/game/state');
                const data = await res.json();
                document.getElementById('current-phase-display').textContent = data.phase;
                updatePlayerList(data.players);
            } catch(e) {}
        }

        function connect() {
            const pid = document.getElementById('playerId').value;
            ws = new WebSocket(`ws://localhost:8000/ws/${pid}`);
            
            ws.onopen = () => {
                logMessage(`Successfully connected as ${pid}`);
                document.getElementById('status-text').textContent = "Connected";
                document.getElementById('connectBtn').disabled = true;
                setInterval(fetchGameState, 3000);
                fetchGameState();
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'event_update') {
                    const e = data.event;
                    if (e.event_type === 'player_speaks') {
                        logMessage(e.payload.content, 'player', e.actor);
                    } else if (e.event_type === 'phase_change') {
                        logMessage(`--- Phase Transition: ${e.phase} ---`);
                    } else {
                        logMessage(`[Event] ${e.event_type}: ${JSON.stringify(e.payload)}`);
                    }
                    fetchGameState();
                } else if (data.type === 'action_request') {
                    handleActionRequest(data.action_type, data.context);
                }
            };
        }

        function handleActionRequest(type, context) {
            pendingActionType = type;
            document.getElementById('action-prompt').textContent = `Action Required: ${type.replace('_', ' ').toUpperCase()}`;
            document.getElementById('submitBtn').disabled = false;
            
            // UI Toggles
            document.getElementById('actionInput').style.display = (type === 'speak') ? 'block' : 'none';
            document.getElementById('toneSelect').style.display = (type === 'speak') ? 'block' : 'none';
            document.getElementById('targetSelect').style.display = (type === 'night_action' || type === 'nominate') ? 'block' : 'none';
            document.getElementById('voteSelect').style.display = (type === 'vote') ? 'block' : 'none';
            document.getElementById('skipBtn').style.display = (type === 'speak') ? 'block' : 'none';
        }

        function skipDiscussion() {
            if (!ws) return;
            const msg = { type: "action_response", payload: { action: "skip_discussion" } };
            ws.send(JSON.stringify(msg));
            logMessage("Requesting to end discussion...", "self");
            clearActionState();
        }

        function sendAction() {
            let payload = { action: pendingActionType };
            if (pendingActionType === 'speak') {
                payload.content = document.getElementById('actionInput').value;
                payload.tone = document.getElementById('toneSelect').value;
            } else if (pendingActionType === 'night_action' || pendingActionType === 'nominate') {
                payload.target = document.getElementById('targetSelect').value;
            } else if (pendingActionType === 'vote') {
                payload.decision = document.getElementById('voteSelect').value === 'true';
            }

            ws.send(JSON.stringify({ type: "action_response", payload }));
            logMessage(`Action submitted: ${pendingActionType}`, 'self');
            clearActionState();
        }

        function clearActionState() {
            document.getElementById('action-prompt').textContent = "Waiting for game engine...";
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('skipBtn').style.display = 'none';
            pendingActionType = null;
        }
    </script>
</body>
</html>
