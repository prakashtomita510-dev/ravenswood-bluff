<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸦木布拉夫小镇 - 说书人控制台 (上帝视角)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        h1 { color: #f2a900; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .card { background: #2d2d2d; border-radius: 8px; padding: 15px; border-top: 4px solid #f2a900; }
        .player-list { list-style: none; padding: 0; }
        .player-li { padding: 10px; margin-bottom: 10px; background: #3c3c3c; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;}
        .living { border-left: 5px solid #03dac6; }
        .dead { border-left: 5px solid #cf6679; opacity: 0.6; }
        .team-good { color: #03dac6; font-weight: bold; }
        .team-evil { color: #cf6679; font-weight: bold; }
        .status-badge { background: #ffb74d; color: black; padding: 2px 5px; border-radius: 4px; font-size: 0.8em; }
        button { background: #f2a900; border: none; color: black; padding: 10px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        button:hover { background: #d49504; }
    </style>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>📖 说书人控制台 (Admin Dashboard)</h1>
        <div>
            <button onclick="refreshState()">↻ 刷新局势</button>
            <button onclick="startGame()" style="background: #03dac6;">▶ 启动游戏循环</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>全局状态</h2>
            <div id="globalState">加载中...</div>
        </div>
        <div class="card" style="grid-column: span 2;">
            <h2>玩家列表 (共 <span id="aliveCount">-</span> 存活)</h2>
            <ul class="player-list" id="playerList">
                <li>加载中...</li>
            </ul>
        </div>
    </div>

    <script>
        async function refreshState() {
            try {
                const res = await fetch('http://localhost:8000/api/game/state');
                const data = await res.json();
                
                if (data.status === "error") {
                    document.getElementById('globalState').innerHTML = `<p style="color:red">${data.message}</p>`;
                    return;
                }

                // 全局状态
                document.getElementById('globalState').innerHTML = `
                    <p><strong>当前阶段:</strong> ${data.phase}</p>
                    <p><strong>当前轮数:</strong> 第 ${data.round_number} 轮</p>
                    <p><strong>当前被提名者:</strong> ${data.current_nominee || '无'}</p>
                `;
                
                document.getElementById('aliveCount').innerText = data.alive_count;

                // 玩家列表
                const list = document.getElementById('playerList');
                list.innerHTML = '';
                
                data.players.forEach(p => {
                    const li = document.createElement('li');
                    li.className = `player-li ${p.is_alive ? 'living' : 'dead'}`;
                    
                    let badges = [];
                    if (p.is_poisoned) badges.push('<span class="status-badge">中毒</span>');
                    if (p.is_drunk) badges.push('<span class="status-badge">醉酒</span>');
                    
                    li.innerHTML = `
                        <div>
                            <strong>${p.name}</strong> (${p.player_id})
                            <div style="font-size: 0.9em; margin-top: 5px;">
                                角色: ${p.role_id} | 
                                阵营: <span class="${p.team === 'good' ? 'team-good' : 'team-evil'}">${p.team === 'good' ? '好人' : '邪恶'}</span>
                                ${badges.join(' ')}
                            </div>
                        </div>
                        <div>
                            ${p.is_alive ? '🟢 存活' : '💀 死亡'}
                        </div>
                    `;
                    list.appendChild(li);
                });

            } catch(e) {
                console.error(e);
                alert("刷新失败，请确保后台在运行！");
            }
        }

        async function startGame() {
            try {
                const res = await fetch('http://localhost:8000/api/game/start', { method: 'POST' });
                const json = await res.json();
                alert(json.message);
                setTimeout(refreshState, 1000);
            } catch(e) {
                alert(`启动失败: ${e.message}`);
            }
        }

        // 初始拉取
        refreshState();
        setInterval(refreshState, 5000); // 轮询最新状态
    </script>
</body>
</html>
